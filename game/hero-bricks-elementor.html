<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;1,9..40,300;1,9..40,500&display=swap');

/* Reset only for our hero component to avoid builder conflicts */
.gl-hero-wrapper {
  --color-bg-dark: #0B0D0F;
  --color-text-dark: #EDEBE6;
  --color-gold: #B8975A;
  --font-heading: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
  
  position: relative;
  height: 100vh;
  width: 100vw;
  max-width: 100%;
  overflow: hidden;
  background-color: var(--color-bg-dark);
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Floating Navigation (Fixed over Hero) */
.gl-hero-nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 100;
  padding: 24px 8vw;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background-color 0.4s ease;
  background-color: transparent;
}

.gl-hero-nav.scrolled {
  background-color: rgba(11, 13, 15, 0.95);
}

.gl-nav-logo img {
  width: auto;
  max-width: 140px;
  max-height: 40px;
  display: block;
}

.gl-nav-links {
  display: flex;
  gap: 40px;
  align-items: center;
  list-style: none;
  margin: 0;
  padding: 0;
}

.gl-nav-links a {
  font-family: var(--font-body);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--color-text-dark);
  text-decoration: none;
  font-weight: 300;
  transition: color 0.3s ease;
}

.gl-nav-links a:hover {
  color: var(--color-gold);
}

.gl-btn-enquire {
  display: inline-block;
  border: 1px solid var(--color-gold);
  color: var(--color-gold) !important;
  padding: 12px 28px;
  background: transparent;
  transition: all 0.4s ease;
}

.gl-btn-enquire:hover {
  background: var(--color-gold);
  color: var(--color-bg-dark) !important;
}

/* Hero Background & Overlay */
.gl-hero-media {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

.gl-hero-media video,
.gl-hero-media img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.gl-hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(12, 48, 34, 0.4) 100%), linear-gradient(180deg, rgba(12, 48, 34, 0.75) 0%, rgba(12, 48, 34, 0.50) 100%);
}

/* Hero Content - Centered */
.gl-hero-content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 3;
  width: 100%;
  max-width: 800px;
  padding: 0 20px;
}

.gl-hero-eyebrow {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--color-gold);
  margin: 0 0 16px 0;
  text-shadow: 0 2px 12px rgba(0,0,0,0.8);
}

.gl-hero-headline {
  font-family: var(--font-heading);
  font-size: clamp(64px, 8vw, 110px);
  font-weight: 600;
  color: var(--color-text-dark);
  line-height: 1.05;
  margin: 0 0 16px 0;
  text-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 2px 10px rgba(0,0,0,0.5);
}

.gl-hero-sub {
  font-family: var(--font-body);
  font-size: clamp(18px, 2vw, 24px);
  font-weight: 500;
  color: #EDEBE6;
  margin: 0 auto;
  max-width: 600px;
  line-height: 1.5;
  text-shadow: 0 4px 20px rgba(0,0,0,0.9), 0 1px 5px rgba(0,0,0,0.6);
}

/* Scroll Indicator */
.gl-scroll-indicator {
  position: absolute;
  bottom: 40px;
  right: 40px;
  z-index: 3;
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--color-gold);
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  animation: gl-bounce 2s infinite;
}

@keyframes gl-bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-10px); }
  60% { transform: translateY(-5px); }
}

/* Mobile Responsive */
@media (max-width: 991px) {
  .gl-hero-nav { padding: 20px 5vw; }
  .gl-nav-links { display: none; /* Add hamburger menu logic if needed, hiding for basic hero preview */ }
  /* .gl-hero-content { left: 5vw; bottom: 8vh; } - Removed for centered layout */
  .gl-hero-headline { font-size: 46px; }
  .gl-hero-sub { font-size: 16px; }
  .gl-scroll-indicator { right: 5vw; bottom: 20px; }
}
</style>

<!-- Floating Navigation -->
<nav class="gl-hero-nav" id="glNav">
  <div class="gl-nav-logo">
    <!-- Replace src with your actual Drive Logo URL once uploaded to WP Media -->
    <img src="/wp-content/themes/game/GL%20logo%20no%20bg.png" alt="Gameplan Legal" style="max-height: 50px; width: auto; object-fit: contain; filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.35)) brightness(1.15) contrast(1.1); transition: filter 0.3s ease;" loading="lazy" decoding="async">
  </div>
  <ul class="gl-nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#expertise">Expertise</a></li>
    <li><a href="#team">Team</a></li>
    <li><a href="#careers">Careers</a></li>
    <li><a href="#contact">Contact</a></li>
    <li><a href="#contact" class="gl-btn-enquire">Enquire &rarr;</a></li>
  </ul>
</nav>

<!-- Hero Section -->
<div class="gl-hero-wrapper">
  
  <div class="gl-hero-media">
    <!-- Looping Background Video -->
    <video autoplay muted loop playsinline poster="https://gameplanlegal.lovable.app/assets/hero-stadium-DSlmV0sa.jpg">
        <source src="/wp-content/themes/game/video.mp4" type="video/mp4">
    </video>
  </div>
  
  <div class="gl-hero-overlay"></div>
  
  <div class="gl-hero-content">
    <p class="gl-hero-eyebrow">Sports Law &middot; Strategy &middot; Disputes</p>
    <h1 class="gl-hero-headline">Gameplan Legal.</h1>
    <p class="gl-hero-sub">Advising on strategy, disputes, and the business of sport.</p>
  </div>
  
  <div class="gl-scroll-indicator">
    Scroll &darr;
  </div>

</div>

<script>
  // Simple script to handle the nav background transition on scroll
  window.addEventListener('scroll', function() {
    var nav = document.getElementById('glNav');
    if (window.scrollY > 50) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
  });
</script>
